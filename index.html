<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 iROX Alternative Points Standings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #ccc; font-family: 'Barlow Condensed','Arial Narrow',Arial,sans-serif; min-height: 100vh; }
    #header { border-bottom: 1px solid #1a1a1a; padding: 0 28px; display: flex; align-items: center; height: 56px; }
    #title { display: flex; align-items: baseline; gap: 10px; }
    #title .icon { color: #e8ff47; font-size: 20px; font-weight: 900; }
    #title .name { color: #fff; font-size: 16px; font-weight: 800; letter-spacing: 0.05em; }
    #title .sub { color: #444; font-size: 13px; letter-spacing: 0.08em; }
    #series-tabs { display: flex; gap: 4px; padding: 10px 28px; background: #060606; border-bottom: 1px solid #1a1a1a; }
    .series-btn { background: transparent; color: #444; border: 1px solid #1a1a1a; border-radius: 4px; padding: 5px 18px; font-family: inherit; font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
    .series-btn.peak.active { background: #e8ff47; color: #0a0a0a; border-color: #e8ff47; }
    .series-btn.heat.active { background: #ff6b35; color: #fff; border-color: #ff6b35; }
    .series-btn.final.active { background: #7c6af7; color: #fff; border-color: #7c6af7; }
    #race-tabs { border-bottom: 1px solid #141414; padding: 8px 28px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; background: #080808; min-height: 44px; }
    .race-tag { background: #1a1a1a; color: #888; border: 2px solid #2a2a2a; border-radius: 4px; padding: 4px 10px; font-family: inherit; font-size: 12px; font-weight: 700; cursor: pointer; letter-spacing: 0.05em; display: flex; align-items: center; gap: 6px; transition: all 0.15s; }
    .race-tag.active { background: #e8ff47; color: #0a0a0a; border-color: #e8ff47; }
    .race-tag .stg-badge { font-size: 9px; border-radius: 2px; padding: 1px 4px; background: #e8ff4722; color: #e8ff47; }
    .race-tag.active .stg-badge { background: #0a0a0a22; color: #0a0a0a; }
    #view-tabs { display: flex; gap: 4px; padding: 8px 28px; background: #080808; border-bottom: 1px solid #141414; }
    .view-btn { background: transparent; color: #555; border: none; padding: 4px 12px; font-family: inherit; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; border-radius: 3px; transition: all 0.15s; }
    .view-btn.active { background: #222; color: #ccc; }
    #slider-wrap { padding: 14px 28px 10px; border-bottom: 1px solid #141414; background: #080808; display: none; }
    #slider-wrap.show { display: block; }
    #slider-label { font-size: 11px; color: #555; letter-spacing: 0.1em; margin-bottom: 8px; }
    #slider-label span { color: #e8ff47; font-weight: 700; }
    input[type=range] { width: 100%; accent-color: #e8ff47; cursor: pointer; }
    #content { padding: 24px 28px; }
    .section-header { margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
    .section-title { font-size: 18px; font-weight: 800; color: #fff; letter-spacing: 0.06em; }
    .section-sub { font-size: 12px; color: #444; margin-left: 12px; }
    .empty-msg { color: #333; font-size: 14px; text-align: center; padding-top: 60px; }
    .tbl-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th { padding: 8px 14px; color: #444; font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; border-bottom: 2px solid #1e1e1e; background: #0d0d0d; text-align: left; white-space: nowrap; }
    th.r { text-align: right; }
    td { padding: 10px 14px; font-size: 13px; color: #ccc; border-bottom: 1px solid #141414; white-space: nowrap; text-align: left; }
    td.r { text-align: right; }
    td.dim { color: #555; }
    td.accent { color: #e8ff47; font-weight: 700; }
    td.dash { color: #2a2a2a; }
    .pos-badge { display: inline-block; width: 24px; text-align: center; font-weight: 900; }
    .pos-1 { color: #e8ff47; font-size: 15px; }
    .pos-2 { color: #aaa; font-size: 15px; }
    .pos-3 { color: #c8935a; font-size: 15px; }
    .pos-n { color: #444; font-size: 12px; }
    tr:nth-child(odd) { background: #0c0c0c; }
    tr:nth-child(even) { background: #0a0a0a; }
    .chg-up { color: #4caf50; font-weight: 700; font-size: 12px; }
    .chg-dn { color: #f44336; font-weight: 700; font-size: 12px; }
    .chg-nc { color: #444; }
    .drop-toggle { background: transparent; border: 1px solid #2a2a2a; color: #666; border-radius: 4px; padding: 4px 10px; font-family: inherit; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; cursor: pointer; transition: all 0.15s; }
    .drop-toggle.on { border-color: #e8ff4755; color: #e8ff47aa; }
    td.dropped-val { color: #444; text-decoration: line-through; font-size: 11px; }
  </style>
</head>
<body>

<div id="header">
  <div id="title">
    <span class="icon">◈</span>
    <span class="name">2026 iROX</span>
    <span class="sub">ALTERNATIVE POINTS STANDINGS</span>
  </div>
</div>

<div id="series-tabs">
  <button class="series-btn peak active" onclick="setSeries('peak')">◆ Peak</button>
  <button class="series-btn heat" onclick="setSeries('heat')">◆ Heat</button>
  <button class="series-btn final" onclick="setSeries('final')">★ Final</button>
</div>

<div id="race-tabs"></div>

<div id="view-tabs">
  <button class="view-btn active" id="vbtn-standings" onclick="setView('standings')">Standings</button>
  <button class="view-btn" id="vbtn-race" onclick="setView('race')">Race Results</button>
</div>

<div id="slider-wrap">
  <div id="slider-label">STANDINGS AFTER: <span id="slider-val">—</span></div>
  <input type="range" id="race-slider" min="1" max="1" value="1" oninput="onSlider(this.value)" />
</div>

<div id="content"><div class="empty-msg">Loading standings...</div></div>

<script>
const CONFIG = { owner:"bgvb13", repo:"irox-standings", dataFile:"data.json" };
const POINTS_BY_POSITION = {1:50,2:40,3:35,4:32,5:30,6:28,7:26,8:24,9:22,10:20,11:19,12:18,13:17,14:16,15:15,16:14,17:13,18:12,19:11,20:10};

let races = [];
let activeSeries = 'peak';
let activeView = 'standings';
let activeRaceId = null;
let sliderIdx = 1;
let dropPeak = false, dropHeat = false;

function seriesRaces() {
  if (activeSeries === 'final') return races;
  return races.filter(r => r.series === activeSeries);
}

function setSeries(s) {
  activeSeries = s;
  document.querySelectorAll('.series-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.series-btn.${s}`).classList.add('active');
  activeView = 'standings';
  activeRaceId = null;
  const isFinal = s === 'final';
  document.getElementById('view-tabs').style.display = isFinal ? 'none' : 'flex';
  document.getElementById('race-tabs').style.display = isFinal ? 'none' : 'flex';
  document.getElementById('vbtn-standings').classList.add('active');
  document.getElementById('vbtn-race').classList.remove('active');
  const sr = seriesRaces();
  sliderIdx = sr.length || 1;
  updateSlider();
  render();
}

function setView(v) {
  activeView = v;
  document.getElementById('vbtn-standings').classList.toggle('active', v === 'standings');
  document.getElementById('vbtn-race').classList.toggle('active', v === 'race');
  updateSlider();
  render();
}

function updateSlider() {
  const wrap = document.getElementById('slider-wrap');
  const sr = seriesRaces();
  if (activeView === 'standings' && activeSeries !== 'final' && sr.length > 0) {
    wrap.classList.add('show');
    const slider = document.getElementById('race-slider');
    slider.min = 1;
    slider.max = sr.length;
    if (sliderIdx > sr.length) sliderIdx = sr.length;
    if (sliderIdx < 1) sliderIdx = 1;
    slider.value = sliderIdx;
    document.getElementById('slider-val').textContent = sr[sliderIdx - 1]?.name || `Race ${sliderIdx}`;
  } else {
    wrap.classList.remove('show');
  }
}

function onSlider(val) {
  sliderIdx = parseInt(val);
  const sr = seriesRaces();
  document.getElementById('slider-val').textContent = sr[sliderIdx - 1]?.name || `Race ${sliderIdx}`;
  render();
}

function buildStandings(raceSet, dropEnabled) {
  const driverMap = {};
  raceSet.forEach(race => {
    race.results.forEach(r => {
      if (!driverMap[r.name]) driverMap[r.name] = { name: r.name, scores: [], wins: 0, poles: 0, stagePoints: 0 };
      driverMap[r.name].scores.push(r.total);
      driverMap[r.name].stagePoints += r.stagePoints || 0;
      if (r.finish === 1) driverMap[r.name].wins++;
      if (r.start === 1) driverMap[r.name].poles++;
    });
  });
  const maxRaces = raceSet.length;
  Object.values(driverMap).forEach(d => { while (d.scores.length < maxRaces) d.scores.push(0); });
  return Object.values(driverMap).map(d => {
    let scores = [...d.scores];
    let dropped = null;
    if (dropEnabled && scores.length > 0) {
      const minIdx = scores.indexOf(Math.min(...scores));
      dropped = scores[minIdx];
      scores = scores.filter((_, i) => i !== minIdx);
    }
    return { name: d.name, total: scores.reduce((a,b)=>a+b,0), races: d.scores.length, wins: d.wins, poles: d.poles, stagePoints: d.stagePoints, dropped };
  }).sort((a,b) => b.total - a.total);
}

function posBadge(pos, rank) {
  const cls = rank===0?'pos-1':rank===1?'pos-2':rank===2?'pos-3':'pos-n';
  return `<span class="pos-badge ${cls}">${pos}</span>`;
}
function dashOrVal(val, prefix='') {
  return val > 0 ? `${prefix}${val}` : `<span class="dash">—</span>`;
}

function render() {
  renderRaceTabs();
  if (activeSeries === 'final') { renderFinal(); return; }
  if (activeView === 'race') { renderRace(); return; }
  renderStandings();
}

function renderRaceTabs() {
  const bar = document.getElementById('race-tabs');
  bar.innerHTML = '';
  const sr = seriesRaces();
  if (sr.length === 0) { bar.innerHTML = '<span style="color:#333;font-size:12px;letter-spacing:0.08em;">NO RACES YET</span>'; return; }
  sr.forEach(race => {
    const hasStage = race.stageResults && Object.values(race.stageResults).some(Boolean);
    const tag = document.createElement('div');
    tag.className = `race-tag${activeRaceId === race.id && activeView === 'race' ? ' active' : ''}`;
    tag.innerHTML = `${race.name}${hasStage ? `<span class="stg-badge">STG</span>` : ''}`;
    tag.onclick = () => { activeRaceId = race.id; setView('race'); };
    bar.appendChild(tag);
  });
}

function renderStandings() {
  const sr = seriesRaces();
  const dropEnabled = activeSeries === 'peak' ? dropPeak : dropHeat;
  const raceSet = sr.slice(0, sliderIdx);
  const sorted = buildStandings(raceSet, dropEnabled);
  let prevSorted = null;
  if (raceSet.length > 1) prevSorted = buildStandings(raceSet.slice(0, raceSet.length - 1), dropEnabled);

  const seriesLabel = activeSeries === 'peak' ? '◆ PEAK SERIES' : '◆ HEAT SERIES';
  const dropOn = dropEnabled;

  let html = `<div class="section-header">
    <div><span class="section-title">${seriesLabel}</span><span class="section-sub">${raceSet.length} of ${sr.length} RACE${sr.length!==1?'S':''}</span></div>
    <button class="drop-toggle ${dropOn?'on':''}" onclick="toggleDrop()">DROP WEEK: ${dropOn?'ON':'OFF'}</button>
  </div>`;

  if (sorted.length === 0) { html += `<div class="empty-msg">No race data yet.</div>`; document.getElementById('content').innerHTML = html; return; }

  const leader = sorted[0].total;
  html += `<div class="tbl-wrap"><table><thead><tr>
    <th>Pos</th><th>Driver</th>
    <th class="r">Points</th><th class="r">Gap</th><th class="r">Chg</th>
    <th class="r">Stage</th><th class="r">Races</th><th class="r">Wins</th><th class="r">Poles</th>
    ${dropOn ? '<th class="r">Dropped</th>' : ''}
  </tr></thead><tbody>`;

  sorted.forEach((d, i) => {
    const gap = i === 0 ? '—' : `-${leader - d.total}`;
    let chg = `<span class="chg-nc">—</span>`;
    if (prevSorted) {
      const prev = prevSorted.findIndex(p => p.name === d.name);
      if (prev === -1) chg = `<span class="chg-up">NEW</span>`;
      else if (prev > i) chg = `<span class="chg-up">▲${prev - i}</span>`;
      else if (prev < i) chg = `<span class="chg-dn">▼${i - prev}</span>`;
    }
    html += `<tr>
      <td>${posBadge(i+1,i)}</td>
      <td class="${i===0?'accent':''}">${d.name}</td>
      <td class="r ${i===0?'accent':''}">${d.total}</td>
      <td class="r dim">${gap}</td>
      <td class="r">${chg}</td>
      <td class="r dim">${d.stagePoints > 0 ? d.stagePoints : '—'}</td>
      <td class="r dim">${d.races}</td>
      <td class="r">${d.wins}</td>
      <td class="r dim">${d.poles}</td>
      ${dropOn ? `<td class="r dropped-val">${d.dropped !== null ? d.dropped : '—'}</td>` : ''}
    </tr>`;
  });
  html += `</tbody></table></div>`;
  document.getElementById('content').innerHTML = html;
}

function renderFinal() {
  const peakRaces = races.filter(r => r.series === 'peak');
  const heatRaces = races.filter(r => r.series === 'heat');
  const peakStnd = buildStandings(peakRaces, dropPeak);
  const heatStnd = buildStandings(heatRaces, dropHeat);
  const names = [...new Set([...peakStnd.map(d=>d.name), ...heatStnd.map(d=>d.name)])];
  const combined = names.map(name => {
    const p = peakStnd.find(d=>d.name===name);
    const h = heatStnd.find(d=>d.name===name);
    return { name, peak: p?.total||0, heat: h?.total||0, total: (p?.total||0)+(h?.total||0), wins: (p?.wins||0)+(h?.wins||0), poles: (p?.poles||0)+(h?.poles||0) };
  }).sort((a,b) => b.total - a.total);

  if (combined.length === 0) { document.getElementById('content').innerHTML = `<div class="empty-msg">No race data yet.</div>`; return; }
  const leader = combined[0].total;
  let html = `<div class="section-header"><div><span class="section-title">★ FINAL CHAMPIONSHIP</span><span class="section-sub">${races.length} TOTAL RACES</span></div></div>
  <div class="tbl-wrap"><table><thead><tr>
    <th>Pos</th><th>Driver</th><th class="r">Total</th><th class="r">Gap</th>
    <th class="r">Peak</th><th class="r">Heat</th><th class="r">Wins</th><th class="r">Poles</th>
  </tr></thead><tbody>`;
  combined.forEach((d, i) => {
    html += `<tr>
      <td>${posBadge(i+1,i)}</td>
      <td class="${i===0?'accent':''}">${d.name}</td>
      <td class="r ${i===0?'accent':''}">${d.total}</td>
      <td class="r dim">${i===0?'—':`-${leader-d.total}`}</td>
      <td class="r dim">${d.peak||'—'}</td>
      <td class="r dim">${d.heat||'—'}</td>
      <td class="r">${d.wins}</td>
      <td class="r dim">${d.poles}</td>
    </tr>`;
  });
  html += `</tbody></table></div>`;
  document.getElementById('content').innerHTML = html;
}

function renderRace() {
  const race = races.find(r => r.id === activeRaceId);
  if (!race) { document.getElementById('content').innerHTML = `<div class="empty-msg">Select a race to view results.</div>`; return; }
  const sorted = [...race.results].sort((a,b) => a.finish - b.finish);
  let html = `<div class="section-header"><div>
    <span class="section-title">${race.name.toUpperCase()}</span>
    <span class="section-sub">${race.results.length} DRIVERS</span>
  </div></div>
  <div class="tbl-wrap"><table><thead><tr>
    <th>Finish</th><th>Driver</th>
    <th class="r">Base</th><th class="r">Pole</th>
    <th class="r">Led Lap</th><th class="r">Most Led</th>
    <th class="r">Stage</th><th class="r">Total</th>
  </tr></thead><tbody>`;
  sorted.forEach((r, i) => {
    html += `<tr>
      <td>${posBadge(r.finish,i)}</td>
      <td class="${r.finish===1?'accent':''}">${r.name}</td>
      <td class="r dim">${r.basePoints}</td>
      <td class="r">${dashOrVal(r.poleBonus,'+')}</td>
      <td class="r">${dashOrVal(r.ledALapBonus,'+')}</td>
      <td class="r">${dashOrVal(r.mostLapsLedBonus,'+')}</td>
      <td class="r">${r.stagePoints>0?`<span style="color:#e8ff47aa">+${r.stagePoints}</span>`:`<span class="dash">—</span>`}</td>
      <td class="r ${r.finish===1?'accent':''}">${r.total}</td>
    </tr>`;
  });
  html += `</tbody></table></div>`;
  document.getElementById('content').innerHTML = html;
}

function toggleDrop() {
  if (activeSeries === 'peak') dropPeak = !dropPeak;
  else dropHeat = !dropHeat;
  render();
}

async function init() {
  try {
    const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.dataFile}`, { headers: { Accept: 'application/vnd.github.v3+json' } });
    if (res.ok) {
      const json = await res.json();
      const data = JSON.parse(atob(json.content.replace(/\n/g,'')));
      if (data.races) races = data.races;
    }
  } catch(e) { console.warn('Load failed', e); }
  const sr = seriesRaces();
  sliderIdx = sr.length || 1;
  updateSlider();
  render();
}

init();
</script>
</body>
</html>
