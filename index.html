<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 iROX Alternative Points Standings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #ccc; font-family: 'Barlow Condensed','Arial Narrow',Arial,sans-serif; min-height: 100vh; }

    /* HEADER */
#header { border-bottom: 1px solid #1a1a1a; padding: 0 28px; display: flex; align-items: center; height: 56px; }
#title { color: #fff; font-size: 18px; font-weight: 800; letter-spacing: 0.06em; }

/* SERIES TABS */
#series-tabs { display: flex; gap: 4px; padding: 10px 28px; background: #060606; border-bottom: 1px solid #1a1a1a; }
.series-btn { background: transparent; color: #444; border: 1px solid #1a1a1a; border-radius: 4px; padding: 5px 18px; font-family: inherit; font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
.series-btn.peak.active { background: #3172D1; color: #fff; border-color: #3172D1; }
.series-btn.heat.active { background: #F46B55; color: #fff; border-color: #F46B55; }
.series-btn.final.active { background: #7c6af7; color: #fff; border-color: #7c6af7; }

/* VIEW TABS */
#view-tabs { display: flex; gap: 4px; padding: 8px 28px; background: #080808; border-bottom: 1px solid #141414; }
.view-btn { background: transparent; color: #555; border: none; padding: 4px 12px; font-family: inherit; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; border-radius: 3px; transition: all 0.15s; }
.view-btn.active { background: #222; color: #ccc; }

/* RACE TABS */
#race-tabs { border-bottom: 1px solid #141414; padding: 8px 28px; display: none; align-items: center; gap: 8px; flex-wrap: wrap; background: #080808; min-height: 44px; }
#race-tabs.visible { display: flex; }
.race-tag { background: #1a1a1a; color: #888; border: 2px solid #2a2a2a; border-radius: 4px; padding: 4px 10px; font-family: inherit; font-size: 12px; font-weight: 700; cursor: pointer; letter-spacing: 0.05em; transition: all 0.15s; }
.race-tag.active { background: #e8ff47; color: #0a0a0a; border-color: #e8ff47; }

/* ARROW NAV */
#arrow-nav { padding: 12px 28px 8px; border-bottom: 1px solid #141414; background: #080808; display: none; align-items: center; justify-content: center; gap: 14px; }
#arrow-nav.show { display: flex; }
.arrow-btn { background: transparent; border: 1px solid #2a2a2a; color: #666; border-radius: 4px; padding: 4px 12px; font-family: inherit; font-size: 14px; cursor: pointer; transition: all 0.15s; line-height: 1; }
.arrow-btn:hover:not(:disabled) { border-color: #444; color: #ccc; }
.arrow-btn:disabled { opacity: 0.2; cursor: default; }
#arrow-label { font-size: 12px; color: #555; letter-spacing: 0.08em; }
#arrow-label span { color: #e8ff47; font-weight: 700; }

/* CONTENT */
#content { padding: 24px 28px; }
.section-header { margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
.section-title { font-size: 18px; font-weight: 800; color: #fff; letter-spacing: 0.06em; }
.section-sub { font-size: 12px; color: #444; margin-left: 12px; }
.empty-msg { color: #333; font-size: 14px; text-align: center; padding-top: 60px; }
.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th { padding: 8px 14px; color: #444; font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; border-bottom: 2px solid #1e1e1e; background: #0d0d0d; text-align: left; white-space: nowrap; }
th.r { text-align: right; }
th.sortable { cursor: pointer; user-select: none; }
th.sortable:hover { color: #888; }
th.sort-active { color: #e8ff47 !important; }
td { padding: 10px 14px; font-size: 13px; color: #ccc; border-bottom: 1px solid #141414; white-space: nowrap; text-align: left; }
td.r { text-align: right; }
td.dim { color: #555; }
td.accent { color: #e8ff47; font-weight: 700; }
td.dash { color: #2a2a2a; }
td.dropped-val { color: #444; text-decoration: line-through; font-size: 11px; }
tr:nth-child(odd) { background: #0c0c0c; }
tr:nth-child(even) { background: #0a0a0a; }
.chg-up { color: #4caf50; font-weight: 700; font-size: 12px; }
.chg-dn { color: #f44336; font-weight: 700; font-size: 12px; }
.chg-nc { color: #444; }
.drop-toggle { background: transparent; border: 1px solid #2a2a2a; color: #666; border-radius: 4px; padding: 4px 10px; font-family: inherit; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; cursor: pointer; transition: all 0.15s; }
.drop-toggle.on { border-color: #e8ff4755; color: #e8ff47aa; }

  </style>
</head>
<body>

<div id="header">
  <div id="title">2026 iROX ALTERNATIVE POINTS STANDINGS</div>
</div>

<div id="series-tabs">
  <button class="series-btn peak active" onclick="setSeries('peak')">Peak</button>
  <button class="series-btn heat" onclick="setSeries('heat')">Heat</button>
  <button class="series-btn final" onclick="setSeries('final')">Final</button>
</div>

<div id="view-tabs">
  <button class="view-btn active" id="vbtn-standings" onclick="setView('standings')">Standings</button>
  <button class="view-btn" id="vbtn-race" onclick="setView('race')">Race Results</button>
</div>

<div id="race-tabs"></div>

<div id="arrow-nav">
  <button class="arrow-btn" id="arrow-prev" onclick="stepArrow(-1)">←</button>
  <div id="arrow-label">STANDINGS AFTER: <span id="arrow-val">—</span></div>
  <button class="arrow-btn" id="arrow-next" onclick="stepArrow(1)">→</button>
</div>

<div id="content"><div class="empty-msg">Loading standings...</div></div>

<script>
const CONFIG = { owner:"bgvb13", repo:"irox-standings", dataFile:"data.json" };
const POINTS_BY_POSITION = {1:50,2:40,3:35,4:32,5:30,6:28,7:26,8:24,9:22,10:20,11:19,12:18,13:17,14:16,15:15,16:14,17:13,18:12,19:11,20:10};
const STAGE_POINTS = {1:10,2:9,3:8,4:7,5:6,6:5,7:4,8:3,9:2,10:1};

let races = [];
let activeSeries = 'peak';
let activeView = 'standings';
let activeRaceId = null;
let arrowIdx = 0;
let dropPeak = false, dropHeat = false;
let sortStandings = { col: 'total', dir: 'desc' };
let sortRace = { col: 'finish', dir: 'asc' };

function seriesRaces() {
  if (activeSeries === 'final') return races;
  return races.filter(r => r.series === activeSeries);
}

function setSeries(s) {
  activeSeries = s;
  document.querySelectorAll('.series-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.series-btn.${s}`).classList.add('active');
  activeView = 'standings';
  activeRaceId = null;
  sortStandings = { col: 'total', dir: 'desc' };
  document.getElementById('vbtn-standings').classList.add('active');
  document.getElementById('vbtn-race').classList.remove('active');
  const isFinal = s === 'final';
  document.getElementById('view-tabs').style.display = isFinal ? 'none' : 'flex';
  const sr = seriesRaces();
  arrowIdx = sr.length;
  updateArrowNav();
  render();
}

function setView(v) {
  activeView = v;
  sortRace = { col: 'finish', dir: 'asc' };
  document.getElementById('vbtn-standings').classList.toggle('active', v === 'standings');
  document.getElementById('vbtn-race').classList.toggle('active', v === 'race');
  document.getElementById('race-tabs').classList.toggle('visible', v === 'race');
  updateArrowNav();
  render();
}

function updateArrowNav() {
  const nav = document.getElementById('arrow-nav');
  const sr = seriesRaces();
  if (activeView === 'standings' && sr.length > 0) {
    nav.classList.add('show');
    if (arrowIdx < 1) arrowIdx = 1;
    if (arrowIdx > sr.length) arrowIdx = sr.length;
    const race = sr[arrowIdx - 1];
    const label = activeSeries === 'final' && race
      ? `${race.name} [${race.series.toUpperCase()}]`
      : race?.name || `Race ${arrowIdx}`;
    document.getElementById('arrow-val').textContent = label;
    document.getElementById('arrow-prev').disabled = arrowIdx <= 1;
    document.getElementById('arrow-next').disabled = arrowIdx >= sr.length;
  } else {
    nav.classList.remove('show');
  }
}

function stepArrow(dir) {
  const sr = seriesRaces();
  arrowIdx = Math.max(1, Math.min(sr.length, arrowIdx + dir));
  updateArrowNav();
  render();
}

function applySort(arr, col, dir) {
  return [...arr].sort((a, b) => {
    const av = a[col] ?? 0, bv = b[col] ?? 0;
    if (typeof av === 'string') return dir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
    return dir === 'asc' ? av - bv : bv - av;
  });
}

function setSortStandings(col) {
  if (sortStandings.col === col) {
    sortStandings.dir = sortStandings.dir === 'desc' ? 'asc' : 'desc';
  } else {
    sortStandings.col = col;
    sortStandings.dir = col === 'races' ? 'asc' : 'desc';
  }
  render();
}

function setSortRace(col) {
  if (sortRace.col === col) {
    sortRace.dir = sortRace.dir === 'asc' ? 'desc' : 'asc';
  } else {
    sortRace.col = col;
    sortRace.dir = col === 'finish' ? 'asc' : 'desc';
  }
  render();
}

function sortIndicator(activeCol, col, dir) {
  return activeCol === col ? (dir === 'desc' ? ' ▼' : ' ▲') : '';
}

function buildStandings(raceSet, dropEnabled) {
  const driverMap = {};
  raceSet.forEach(race => {
    race.results.forEach(r => {
      if (!driverMap[r.name]) driverMap[r.name] = { name: r.name, scores: [], wins: 0, poles: 0, stagePoints: 0, top5: 0, top10: 0 };
      driverMap[r.name].scores.push(r.total);
      driverMap[r.name].stagePoints += r.stagePoints || 0;
      if (r.finish === 1) driverMap[r.name].wins++;
      if (r.start === 1) driverMap[r.name].poles++;
      if (r.finish <= 5) driverMap[r.name].top5++;
      if (r.finish <= 10) driverMap[r.name].top10++;
    });
  });
  const maxRaces = raceSet.length;
  Object.values(driverMap).forEach(d => { while (d.scores.length < maxRaces) d.scores.push(0); });
  return Object.values(driverMap).map(d => {
    let scores = [...d.scores];
    let dropped = null;
    if (dropEnabled && scores.length > 0) {
      const minIdx = scores.indexOf(Math.min(...scores));
      dropped = scores[minIdx];
      scores = scores.filter((_, i) => i !== minIdx);
    }
    return { name: d.name, total: scores.reduce((a,b)=>a+b,0), races: d.scores.length, wins: d.wins, poles: d.poles, stagePoints: d.stagePoints, top5: d.top5, top10: d.top10, dropped };
  }).sort((a,b) => b.total - a.total);
}

function render() {
  renderRaceTabs();
  if (activeSeries === 'final') { renderFinal(); return; }
  if (activeView === 'race') { renderRace(); return; }
  renderStandings();
}

function renderRaceTabs() {
  const bar = document.getElementById('race-tabs');
  bar.innerHTML = '';
  const sr = seriesRaces();
  sr.forEach(race => {
    const tag = document.createElement('div');
    tag.className = `race-tag${activeRaceId === race.id && activeView === 'race' ? ' active' : ''}`;
    tag.textContent = race.name;
    tag.onclick = () => { activeRaceId = race.id; setView('race'); };
    bar.appendChild(tag);
  });
}

function renderStandings() {
  const sr = seriesRaces();
  const dropEnabled = activeSeries === 'peak' ? dropPeak : dropHeat;
  const raceSet = sr.slice(0, arrowIdx);
  const byPoints = buildStandings(raceSet, dropEnabled);
  let prevSorted = null;
  if (raceSet.length > 1) prevSorted = buildStandings(raceSet.slice(0, raceSet.length - 1), dropEnabled);

  const leader = byPoints.length > 0 ? byPoints[0].total : 0;
  const sorted = applySort(byPoints, sortStandings.col, sortStandings.dir);

  const seriesLabel = activeSeries === 'peak' ? 'PEAK SERIES' : 'HEAT SERIES';
  let html = `<div class="section-header">
    <div><span class="section-title">${seriesLabel}</span><span class="section-sub">${raceSet.length} of ${sr.length} RACE${sr.length!==1?'S':''}</span></div>
    <button class="drop-toggle ${dropEnabled?'on':''}" onclick="toggleDrop()">DROP WEEK: ${dropEnabled?'ON':'OFF'}</button>
  </div>`;

  if (sorted.length === 0) { html += `<div class="empty-msg">No race data yet.</div>`; document.getElementById('content').innerHTML = html; return; }

  const si = sortStandings;
  html += `<div class="tbl-wrap"><table><thead><tr>
    <th class="sortable${si.col==='total'?' sort-active':''}" onclick="setSortStandings('total')">Pos${sortIndicator(si.col,'total',si.dir)}</th>
    <th class="sortable${si.col==='name'?' sort-active':''}" onclick="setSortStandings('name')">Driver${sortIndicator(si.col,'name',si.dir)}</th>
    <th class="r sortable${si.col==='total'?' sort-active':''}" onclick="setSortStandings('total')">Points${sortIndicator(si.col,'total',si.dir)}</th>
    <th class="r">Gap</th>
    <th class="r">Chg</th>
    <th class="r sortable${si.col==='stagePoints'?' sort-active':''}" onclick="setSortStandings('stagePoints')">Stage${sortIndicator(si.col,'stagePoints',si.dir)}</th>
    <th class="r sortable${si.col==='races'?' sort-active':''}" onclick="setSortStandings('races')">Races${sortIndicator(si.col,'races',si.dir)}</th>
    <th class="r sortable${si.col==='wins'?' sort-active':''}" onclick="setSortStandings('wins')">Wins${sortIndicator(si.col,'wins',si.dir)}</th>
    <th class="r sortable${si.col==='poles'?' sort-active':''}" onclick="setSortStandings('poles')">Poles${sortIndicator(si.col,'poles',si.dir)}</th>
    <th class="r sortable${si.col==='top5'?' sort-active':''}" onclick="setSortStandings('top5')">T5${sortIndicator(si.col,'top5',si.dir)}</th>
    <th class="r sortable${si.col==='top10'?' sort-active':''}" onclick="setSortStandings('top10')">T10${sortIndicator(si.col,'top10',si.dir)}</th>
    ${dropEnabled ? '<th class="r">Dropped</th>' : ''}
  </tr></thead><tbody>`;

  sorted.forEach((d, i) => {
    const gap = d.total === leader ? '—' : `-${leader - d.total}`;
    let chg = `<span class="chg-nc">—</span>`;
    if (prevSorted) {
      const prev = prevSorted.findIndex(p => p.name === d.name);
      const cur = byPoints.findIndex(p => p.name === d.name);
      if (prev === -1) chg = `<span class="chg-up">NEW</span>`;
      else if (prev > cur) chg = `<span class="chg-up">▲${prev - cur}</span>`;
      else if (prev < cur) chg = `<span class="chg-dn">▼${cur - prev}</span>`;
    }
    const isLeader = d.total === leader;
    html += `<tr>
      <td class="dim">${i + 1}</td>
      <td class="${isLeader?'accent':''}">${d.name}</td>
      <td class="r ${isLeader?'accent':''}">${d.total}</td>
      <td class="r dim">${gap}</td>
      <td class="r">${chg}</td>
      <td class="r dim">${d.stagePoints > 0 ? d.stagePoints : '—'}</td>
      <td class="r dim">${d.races}</td>
      <td class="r">${d.wins}</td>
      <td class="r dim">${d.poles}</td>
      <td class="r dim">${d.top5}</td>
      <td class="r dim">${d.top10}</td>
      ${dropEnabled ? `<td class="r dropped-val">${d.dropped !== null ? d.dropped : '—'}</td>` : ''}
    </tr>`;
  });
  html += `</tbody></table></div>`;
  document.getElementById('content').innerHTML = html;
}

function renderFinal() {
  const allRaces = races.slice(0, arrowIdx);
  const peakRaces = allRaces.filter(r => r.series === 'peak');
  const heatRaces = allRaces.filter(r => r.series === 'heat');
  const peakStnd = buildStandings(peakRaces, dropPeak);
  const heatStnd = buildStandings(heatRaces, dropHeat);
  const names = [...new Set([...peakStnd.map(d=>d.name), ...heatStnd.map(d=>d.name)])];
  const byPoints = names.map(name => {
    const p = peakStnd.find(d=>d.name===name);
    const h = heatStnd.find(d=>d.name===name);
    return {
      name,
      total: (p?.total||0) + (h?.total||0),
      wins: (p?.wins||0) + (h?.wins||0),
      poles: (p?.poles||0) + (h?.poles||0),
      top5: (p?.top5||0) + (h?.top5||0),
      top10: (p?.top10||0) + (h?.top10||0)
    };
  }).sort((a,b) => b.total - a.total);

  if (byPoints.length === 0) { document.getElementById('content').innerHTML = `<div class="empty-msg">No race data yet.</div>`; return; }
  const leader = byPoints[0].total;
  const sorted = applySort(byPoints, sortStandings.col, sortStandings.dir);

  const peakCount = peakRaces.length, heatCount = heatRaces.length;
  const subLabel = peakCount + heatCount === 0 ? '0 RACES'
    : [peakCount ? `${peakCount} PEAK` : '', heatCount ? `${heatCount} HEAT` : ''].filter(Boolean).join(' + ') + ` RACE${peakCount+heatCount!==1?'S':''}`;

  const si = sortStandings;
  let html = `<div class="section-header"><div><span class="section-title">FINAL CHAMPIONSHIP</span><span class="section-sub">${subLabel}</span></div></div>
  <div class="tbl-wrap"><table><thead><tr>
    <th class="sortable${si.col==='total'?' sort-active':''}" onclick="setSortStandings('total')">Pos${sortIndicator(si.col,'total',si.dir)}</th>
    <th class="sortable${si.col==='name'?' sort-active':''}" onclick="setSortStandings('name')">Driver${sortIndicator(si.col,'name',si.dir)}</th>
    <th class="r sortable${si.col==='total'?' sort-active':''}" onclick="setSortStandings('total')">Points${sortIndicator(si.col,'total',si.dir)}</th>
    <th class="r">Gap</th>
    <th class="r sortable${si.col==='wins'?' sort-active':''}" onclick="setSortStandings('wins')">Wins${sortIndicator(si.col,'wins',si.dir)}</th>
    <th class="r sortable${si.col==='poles'?' sort-active':''}" onclick="setSortStandings('poles')">Poles${sortIndicator(si.col,'poles',si.dir)}</th>
    <th class="r sortable${si.col==='top5'?' sort-active':''}" onclick="setSortStandings('top5')">T5${sortIndicator(si.col,'top5',si.dir)}</th>
    <th class="r sortable${si.col==='top10'?' sort-active':''}" onclick="setSortStandings('top10')">T10${sortIndicator(si.col,'top10',si.dir)}</th>
  </tr></thead><tbody>`;
  sorted.forEach((d, i) => {
    const isLeader = d.total === leader;
    html += `<tr>
      <td class="dim">${i + 1}</td>
      <td class="${isLeader?'accent':''}">${d.name}</td>
      <td class="r ${isLeader?'accent':''}">${d.total}</td>
      <td class="r dim">${isLeader?'—':`-${leader-d.total}`}</td>
      <td class="r">${d.wins}</td>
      <td class="r dim">${d.poles}</td>
      <td class="r dim">${d.top5}</td>
      <td class="r dim">${d.top10}</td>
    </tr>`;
  });
  html += `</tbody></table></div>`;
  document.getElementById('content').innerHTML = html;
}

function renderRace() {
  const race = races.find(r => r.id === activeRaceId);
  if (!race) { document.getElementById('content').innerHTML = `<div class="empty-msg">Select a race to view results.</div>`; return; }
  const sorted = applySort([...race.results], sortRace.col, sortRace.dir);
  const sr = sortRace;
  let html = `<div class="section-header"><div>
    <span class="section-title">${race.name.toUpperCase()}</span>
    <span class="section-sub">${race.results.length} DRIVERS</span>
  </div></div>
  <div class="tbl-wrap"><table><thead><tr>
    <th class="sortable${sr.col==='finish'?' sort-active':''}" onclick="setSortRace('finish')">Finish${sortIndicator(sr.col,'finish',sr.dir)}</th>
    <th>Driver</th>
    <th class="r sortable${sr.col==='basePoints'?' sort-active':''}" onclick="setSortRace('basePoints')">Points${sortIndicator(sr.col,'basePoints',sr.dir)}</th>
    <th class="r">Pole</th>
    <th class="r">Led Lap</th>
    <th class="r">Most Led</th>
    <th class="r">Stage</th>
    <th class="r sortable${sr.col==='total'?' sort-active':''}" onclick="setSortRace('total')">Total${sortIndicator(sr.col,'total',sr.dir)}</th>
  </tr></thead><tbody>`;
  sorted.forEach((r, i) => {
    html += `<tr>
      <td class="dim">${r.finish}</td>
      <td class="${r.finish===1?'accent':''}">${r.name}</td>
      <td class="r dim">${r.basePoints}</td>
      <td class="r">${r.poleBonus > 0 ? `+${r.poleBonus}` : `<span class="dash">—</span>`}</td>
      <td class="r">${r.ledALapBonus > 0 ? `+${r.ledALapBonus}` : `<span class="dash">—</span>`}</td>
      <td class="r">${r.mostLapsLedBonus > 0 ? `+${r.mostLapsLedBonus}` : `<span class="dash">—</span>`}</td>
      <td class="r">${r.stagePoints>0?`<span style="color:#e8ff47aa">+${r.stagePoints}</span>`:`<span class="dash">—</span>`}</td>
      <td class="r ${r.finish===1?'accent':''}">${r.total}</td>
    </tr>`;
  });
  html += `</tbody></table></div>`;
  document.getElementById('content').innerHTML = html;
}

function toggleDrop() {
  if (activeSeries === 'peak') dropPeak = !dropPeak;
  else dropHeat = !dropHeat;
  render();
}

async function init() {
  try {
    const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.dataFile}`, { headers: { Accept: 'application/vnd.github.v3+json' } });
    if (res.ok) {
      const json = await res.json();
      const data = JSON.parse(atob(json.content.replace(/\n/g,'')));
      if (data.races) races = data.races;
    }
  } catch(e) { console.warn('Load failed', e); }
  const sr = seriesRaces();
  arrowIdx = sr.length || 1;
  updateArrowNav();
  render();
}

init();
</script>

</body>
</html>
